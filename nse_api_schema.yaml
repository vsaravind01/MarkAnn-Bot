provider: nse
v1:
    corporate_announcements:
        base: https://www.nseindia.com/api/corporate-announcements
        args:
            index:
                - equities
                - mf
                - sme
                - debt
                - sse
            from_date:
                example: 26-05-2026
            to_date:
                example: 27-05-2026
            symbol:
                example: INFY
                hint: Valid NSE symbols only
            fo_sec:
                example: true
                type: boolean
                hint: true | false
                description: If set to true, returns only FO securities; This is kind of a filter
        example:
            request: https://www.nseindia.com/api/corporate-announcements?index=equities&from_date=26-05-2026&to_date=27-05-2026
            response: |
                [
                {
                "symbol": "MFML",
                "desc": "General Updates",
                "dt": "27052026235528",
