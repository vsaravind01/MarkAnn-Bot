    search_equities:
        base: https://www.nseindia.com/api/smart-search/eqEtf
        args:
            q:
                example: Infosys
                description: Fuzzy search for equities by name (supports case insensitive search)
        example:
            request: https://www.nseindia.com/api/smart-search/eqEtf?q=Inf
            response: |
                [
                {
                "change": 0,
                "companyName": "Infosys Limited",
                "lastPrice": 0,
                "pChange": 0,
                "segment": "in equity",
                "series": "EQ",
                "symbol": "INFY",
                "url": "/get-quotes/equity?symbol=INFY",
                "webUrl": "/get-quote/equity/INFY/Infosys-Limited"
                },
                {
                "change": 0,
                "companyName": "Info Edge (India) Limited",
                "lastPrice": 0,
                "pChange": 0,
                "segment": "in equity",
                "series": "EQ",
                "symbol": "NAUKRI",
                "url": "/get-quotes/equity?symbol=NAUKRI",
                "webUrl": "/get-quote/equity/NAUKRI/Info-Edge-(India)-Limited"
                },
                ...
                ]

    insider_trading:
        base: https://www.nseindia.com/api/corporates-pit-gg
        args:
