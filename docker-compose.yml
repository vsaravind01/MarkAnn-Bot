services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: markann
      POSTGRES_USER: markann
      POSTGRES_PASSWORD: markann
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U markann -d markann"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Database migrations (runs once, then exits) ───────────────────────────

  migrate:
    build: .
    command: >
      uv run alembic
      -c database/migrations/alembic.ini
      upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://markann:markann@postgres:5432/markann
      UV_PROJECT_ENVIRONMENT: /venv
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Registry seed (runs once after migrate, then exits) ───────────────────
  # Registers + enables the built-in default components so a fresh deployment
  # comes up with the shipped feature running. Idempotent and only enables
  # newly-created rows, so operator enable/disable choices survive restarts.

  register:
    build: .
    command: uv run python -m engine.register seed
    environment:
      DATABASE_URL: postgresql+asyncpg://markann:markann@postgres:5432/markann
      UV_PROJECT_ENVIRONMENT: /venv
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  # ── Application services ──────────────────────────────────────────────────

  backend:
    build: .
    command: >
      uv run uvicorn api.app:app
      --host 0.0.0.0
      --port 1530
      --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://markann:markann@postgres:5432/markann
      REDIS_URL: redis://redis:6379/0
      UV_PROJECT_ENVIRONMENT: /venv
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:1530/health')\""
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  gateway:
    build: .
    command: >
      uv run uvicorn gateway.main:app
      --host 0.0.0.0
      --port 9150
      --reload
    environment:
      BACKEND_URL: http://backend:1530
      DATABASE_URL: postgresql+asyncpg://markann:markann@postgres:5432/markann
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-set-JWT_SECRET-in-.env}
      ALLOWED_ORIGINS: http://localhost:5173
      HTTPS: "false"
      UV_PROJECT_ENVIRONMENT: /venv
    ports:
      - "9150:9150"
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  engine:
    build: .
    command: uv run python -m engine.main
    environment:
      DATABASE_URL: postgresql+asyncpg://markann:markann@postgres:5432/markann
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      POLL_INTERVAL: ${POLL_INTERVAL:-5}
      UV_PROJECT_ENVIRONMENT: /venv
    # Lets OPENAI_BASE_URL=http://host.docker.internal:8000/v1 reach a server
    # running on the host (e.g. local vLLM), including on Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    depends_on:
      register:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: on-failure

  # ── Frontend dev server ───────────────────────────────────────────────────

  frontend:
    build:
      context: app/admin
      dockerfile: Dockerfile
    environment:
      VITE_GATEWAY_URL: http://gateway:9150
    ports:
      - "5173:5173"
    volumes:
      - ./app/admin:/app
      - /app/node_modules
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
